<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f4e"/>
      <stop offset="100%" style="stop-color:#1a1333"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c060"/>
      <stop offset="100%" style="stop-color:#d4a040"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#d4a040" stroke-width="8"/>
  <!-- Open book at bottom -->
  <path d="M140 340 L256 310 L372 340 L372 390 C372 390 314 370 256 380 C198 370 140 390 140 390 Z" fill="url(#gold)" opacity="0.9"/>
  <line x1="256" y1="310" x2="256" y2="380" stroke="#2a1f4e" stroke-width="3" opacity="0.5"/>
  <!-- Owl body -->
  <ellipse cx="256" cy="230" rx="90" ry="100" fill="#d4a040" opacity="0.15"/>
  <!-- Owl face/head -->
  <circle cx="256" cy="200" r="75" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <!-- Eyes -->
  <circle cx="226" cy="190" r="22" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="286" cy="190" r="22" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="226" cy="190" r="8" fill="url(#gold)"/>
  <circle cx="286" cy="190" r="8" fill="url(#gold)"/>
  <!-- Beak -->
  <path d="M248 210 L256 225 L264 210" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ear tufts -->
  <path d="M195 145 L210 170 L180 165" fill="url(#gold)" opacity="0.8"/>
  <path d="M317 145 L302 170 L332 165" fill="url(#gold)" opacity="0.8"/>
  <!-- Magnifying glass (scout element) -->
  <circle cx="350" cy="150" r="30" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <line x1="372" y1="172" x2="395" y2="195" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
</svg>
