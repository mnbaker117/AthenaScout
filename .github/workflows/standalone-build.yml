name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'app/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'run.py'
      - 'athenascout.spec'
      - 'requirements.txt'
      - 'requirements-build.txt'
      - '.github/workflows/standalone-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: athenascout-linux
            executable: athenascout
          - os: windows-latest
            artifact_name: athenascout-windows
            executable: athenascout.exe
          - os: macos-latest
            artifact_name: athenascout-macos
            executable: athenascout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Build executable with PyInstaller
        run: pyinstaller athenascout.spec --noconfirm

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f "dist/athenascout/${{ matrix.executable }}" ]; then
            echo "::error::Executable not found at dist/athenascout/${{ matrix.executable }}"
            exit 1
          fi
          if [ ! -f "dist/athenascout/_internal/frontend/dist/index.html" ]; then
            echo "::error::Frontend not bundled correctly"
            exit 1
          fi
          echo "✓ Build verified for ${{ matrix.os }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/athenascout/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            echo "Archiving $name..."
            # Make executable bit is preserved on Linux/macOS via tar
            tar -czf "../${name}.tar.gz" -C "$dir" .
          done
          cd ..
          ls -lh *.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
