name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'app/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'run.py'
      - 'athenascout.spec'
      - 'requirements.txt'
      - 'requirements-build.txt'
      - '.github/workflows/standalone-build.yml'
  workflow_dispatch:

# Default to least-privilege permissions for all jobs.
# The `release` job below overrides this with `contents: write` so it can
# upload artifacts to GitHub Releases.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
# Tag builds (releases) are never cancelled — each tag gets its own concurrency group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: athenascout-linux
            executable: athenascout
          - os: windows-latest
            artifact_name: athenascout-windows
            executable: athenascout.exe
          - os: macos-latest
            artifact_name: athenascout-macos
            executable: athenascout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build executable with PyInstaller
        run: pyinstaller athenascout.spec --noconfirm

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f "dist/athenascout/${{ matrix.executable }}" ]; then
            echo "::error::Executable not found at dist/athenascout/${{ matrix.executable }}"
            exit 1
          fi
          if [ ! -f "dist/athenascout/_internal/frontend/dist/index.html" ]; then
            echo "::error::Frontend not bundled correctly"
            exit 1
          fi
          echo "✓ Build verified for ${{ matrix.os }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/athenascout/
          retention-days: 30
          if-no-files-found: error

      # ─── Linux Native Packaging (AppImage, .deb, .rpm) ──────────────
      - name: Linux — Determine version
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Linux packages for version: $VERSION"

      - name: Linux — Install packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm librsvg2-bin file
          # AppImage tool from upstream
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Linux — Generate icon PNG from SVG
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build/icons
          rsvg-convert -w 256 -h 256 frontend/public/icon.svg -o build/icons/athenascout.png
          file build/icons/athenascout.png

      - name: Linux — Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p packages
          APPDIR=build/AthenaScout.AppDir

          # Build the AppDir structure
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Copy PyInstaller output (preserves the athenascout/ folder name)
          cp -r dist/athenascout "$APPDIR/usr/bin/"

          # Desktop file at top-level (required by AppImage spec) AND canonical location
          cp build_assets/athenascout.desktop "$APPDIR/"
          cp build_assets/athenascout.desktop "$APPDIR/usr/share/applications/"

          # Icon at top-level (required by AppImage spec) AND canonical location
          cp build/icons/athenascout.png "$APPDIR/athenascout.png"
          cp build/icons/athenascout.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/"

          # AppRun entry script
          cp build_assets/AppRun "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Build the AppImage
          # --appimage-extract-and-run is required because GitHub runners don't have libfuse2.
          # This tells appimagetool (which is itself an AppImage) to extract and run from a
          # temp dir instead of mounting via FUSE. The output AppImage is unaffected — it's
          # a normal AppImage that uses FUSE on end-user systems where it's available.
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$APPDIR" "packages/AthenaScout-${VERSION}-x86_64.AppImage"
          ls -lh packages/

      - name: Linux — Build .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          PKGROOT=build/deb-package
          mkdir -p "$PKGROOT/DEBIAN"
          mkdir -p "$PKGROOT/opt/athenascout"
          mkdir -p "$PKGROOT/usr/bin"
          mkdir -p "$PKGROOT/usr/share/applications"
          mkdir -p "$PKGROOT/usr/share/icons/hicolor/256x256/apps"

          # Copy app files into /opt/athenascout
          cp -r dist/athenascout/* "$PKGROOT/opt/athenascout/"

          # Wrapper script in /usr/bin
          cat > "$PKGROOT/usr/bin/athenascout" << 'EOF'
          #!/bin/bash
          exec /opt/athenascout/athenascout "$@"
          EOF
          chmod +x "$PKGROOT/usr/bin/athenascout"

          # Desktop file + icon
          cp build_assets/athenascout.desktop "$PKGROOT/usr/share/applications/"
          cp build/icons/athenascout.png "$PKGROOT/usr/share/icons/hicolor/256x256/apps/"

          # Generate control file from template with version substituted
          sed "s/{VERSION}/$VERSION/g" build_assets/control.template > "$PKGROOT/DEBIAN/control"
          cat "$PKGROOT/DEBIAN/control"

          # Build the .deb
          dpkg-deb --build "$PKGROOT" "packages/athenascout_${VERSION}_amd64.deb"
          ls -lh packages/

      - name: Linux — Build .rpm package
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Set up rpmbuild directory tree
          RPMBUILD=$HOME/rpmbuild
          mkdir -p "$RPMBUILD"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # RPM's Version: field doesn't allow hyphens (they're reserved as the
          # Version-Release separator). Convert to dots for RPM compatibility.
          # For real tag versions like "2.0.0" this is a no-op. Only affects
          # dev builds where VERSION is something like "0.0.0-dev".
          RPM_VERSION="${VERSION//-/.}"
          echo "RPM-safe version: $RPM_VERSION"

          # Stage source files (PyInstaller output + desktop file + icon)
          STAGING=build/rpm-staging/athenascout-${RPM_VERSION}
          mkdir -p "$STAGING"
          cp -r dist/athenascout/* "$STAGING/"
          cp build_assets/athenascout.desktop "$STAGING/"
          cp build/icons/athenascout.png "$STAGING/"

          # Create source tarball (filename must match Source0 in spec)
          (cd build/rpm-staging && tar -czf "$RPMBUILD/SOURCES/athenascout-${RPM_VERSION}.tar.gz" "athenascout-${RPM_VERSION}")

          # Generate RPM spec from template (use RPM-safe version)
          sed "s/{VERSION}/$RPM_VERSION/g" build_assets/athenascout.rpm.spec.template > "$RPMBUILD/SPECS/athenascout.spec"
          cat "$RPMBUILD/SPECS/athenascout.spec"

          # Build the RPM
          rpmbuild -bb "$RPMBUILD/SPECS/athenascout.spec"

          # Move output to packages directory
          cp "$RPMBUILD/RPMS/x86_64/"athenascout-${RPM_VERSION}-1*.rpm packages/
          ls -lh packages/

      - name: Linux — Upload native packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: athenascout-linux-packages
          path: packages/
          retention-days: 30
          if-no-files-found: error

      # ─── Windows Native Packaging (.exe + Inno Setup installer) ─────
      - name: Windows — Determine version
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Windows packages for version: $VERSION"

      - name: Windows — Build single-file executable
        if: matrix.os == 'windows-latest'
        run: pyinstaller athenascout-onefile.spec --noconfirm

      - name: Windows — Verify single-file build
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f "dist/AthenaScout-Portable.exe" ]; then
            echo "::error::Single-file executable not found at dist/AthenaScout-Portable.exe"
            ls -la dist/
            exit 1
          fi
          echo "✓ Single-file build verified"

      - name: Windows — Install Inno Setup
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Windows — Generate installer script with version
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          sed "s/{VERSION}/$VERSION/g" build_assets/installer.iss > installer-build.iss
          cat installer-build.iss

      - name: Windows — Build installer with Inno Setup
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer-build.iss

      - name: Windows — Collect native packages
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p packages
          # Single-file portable executable (rename to include version)
          cp "dist/AthenaScout-Portable.exe" "packages/AthenaScout-${VERSION}.exe"
          # Inno Setup installer (already named with version by the .iss script)
          cp Output/AthenaScout-*-Setup.exe packages/
          ls -lh packages/

      - name: Windows — Upload native packages
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: athenascout-windows-packages
          path: packages/
          retention-days: 30
          if-no-files-found: error

      # ─── macOS Native Packaging (.app bundle + .dmg) ────────────────
      - name: macOS — Determine version
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building macOS packages for version: $VERSION"

      - name: macOS — Generate .icns icon from SVG
        if: matrix.os == 'macos-latest'
        run: |
          # Install librsvg for SVG → PNG conversion (sips can't read SVG directly)
          brew install librsvg

          # Convert source SVG to a high-resolution PNG
          mkdir -p build/icon-staging
          rsvg-convert -w 1024 -h 1024 frontend/public/icon.svg -o build/icon-staging/icon.png

          # Build the .iconset directory with all required sizes for retina displays.
          # macOS expects a specific naming convention for each size.
          mkdir -p build/AthenaScout.iconset
          sips -z 16 16     build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_16x16.png
          sips -z 32 32     build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_32x32.png
          sips -z 64 64     build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_128x128.png
          sips -z 256 256   build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_256x256.png
          sips -z 512 512   build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_256x256@2x.png
          sips -z 512 512   build/icon-staging/icon.png --out build/AthenaScout.iconset/icon_512x512.png
          cp                build/icon-staging/icon.png   build/AthenaScout.iconset/icon_512x512@2x.png

          # Compile the .iconset folder into a single .icns file
          iconutil -c icns build/AthenaScout.iconset -o build/AthenaScout.icns
          file build/AthenaScout.icns
          ls -lh build/AthenaScout.icns

          # Export the icon path for the spec to find via os.environ
          echo "ATHENASCOUT_ICON_PATH=$PWD/build/AthenaScout.icns" >> $GITHUB_ENV

      - name: macOS — Build .app bundle with PyInstaller
        if: matrix.os == 'macos-latest'
        run: |
          # --distpath dist-mac keeps the .app bundle in a separate directory
          # from the main athenascout.spec output (dist/athenascout/) so they
          # don't collide on the same runner.
          pyinstaller athenascout-macos.spec --noconfirm --distpath dist-mac

      - name: macOS — Verify .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          if [ ! -d "dist-mac/AthenaScout.app" ]; then
            echo "::error::AthenaScout.app not created"
            ls -la dist-mac/ || true
            exit 1
          fi
          if [ ! -f "dist-mac/AthenaScout.app/Contents/MacOS/athenascout" ]; then
            echo "::error::Executable not found inside .app bundle"
            find dist-mac/AthenaScout.app -type f | head -20
            exit 1
          fi
          if [ ! -f "dist-mac/AthenaScout.app/Contents/Info.plist" ]; then
            echo "::error::Info.plist not found"
            exit 1
          fi
          echo "✓ .app bundle structure verified"
          du -sh dist-mac/AthenaScout.app

      - name: macOS — Build .dmg disk image
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p packages

          # Stage the .dmg contents: the .app bundle + a symlink to /Applications
          # for the iconic "drag to Applications" install experience.
          mkdir -p build/dmg-staging
          cp -R dist-mac/AthenaScout.app build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications

          # Create the .dmg using macOS's built-in hdiutil.
          # UDZO = compressed disk image (zlib).
          hdiutil create \
            -volname "AthenaScout" \
            -srcfolder build/dmg-staging \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "packages/AthenaScout-${VERSION}.dmg"

          ls -lh packages/

      - name: macOS — Upload native packages
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: athenascout-macos-packages
          path: packages/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            echo "Processing $name..."
            case "$name" in
              athenascout-linux-packages|athenascout-windows-packages|athenascout-macos-packages)
                # Native packages — copy directly without re-archiving.
                # Includes .AppImage, .deb, .rpm (Linux), .exe (Windows), .dmg (macOS).
                find "$dir" -type f \( \
                  -name "*.AppImage" -o \
                  -name "*.deb" -o \
                  -name "*.rpm" -o \
                  -name "*.exe" -o \
                  -name "*.dmg" \
                  \) -exec cp {} ../release/ \;
                ;;
              athenascout-windows)
                # Windows source bundle — use .zip (native Explorer support).
                # tar.gz requires extra tools that most Windows users don't have.
                (cd "$dir" && zip -qr "../../release/${name}.zip" .)
                ;;
              *)
                # Linux/macOS source bundles — use tar.gz (preserves file modes).
                tar -czf "../release/${name}.tar.gz" -C "$dir" .
                ;;
            esac
          done
          cd ..
          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'release/*'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
