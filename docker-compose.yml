services:
  athena-scout:
    # ── Image Source ───────────────────────────────────────────
    # Option 1 (recommended): Use pre-built image. Pin to a specific
    # version tag (e.g., :v1.1.0) for production rather than :latest
    # so unattended updates can't surprise you.
    image: ghcr.io/mnbaker117/athenascout:latest
    # Option 2: Build from source — uncomment below and comment out 'image:' above
    # build: .

    container_name: athena-scout
    ports:
      # Host port : Container port — change left side to use a different host port
      - "8787:8787"
    volumes:
      # Mount your library root (read-only). AthenaScout scans this path
      # AND its immediate subdirectories for any folder containing a
      # metadata.db, registering each as a separate library.
      # Example: if /calibre contains /calibre/books/ and /calibre/Audiobooks/,
      # both will appear as separate libraries in the app.
      - /mnt/user/appdata/calibre:/calibre:ro
      # Persistent data for AthenaScout's databases, settings, auth secret,
      # and per-library SQLite files (survives restarts and image updates).
      - ./data:/app/data
      # Extra library locations (uncomment and update to match CALIBRE_EXTRA_PATHS):
      # - /mnt/user/downloads:/downloads:ro
      # - /mnt/user/other-libs:/extra-libs:ro
    environment:
      # ── Library Discovery ────────────────────────────────────
      # Primary discovery root. AthenaScout's library-app framework will
      # scan this path for Calibre libraries (and, in future releases,
      # other ebook/audiobook managers via additional adapters).
      - CALIBRE_PATH=/calibre
      # Additional mount points (comma-delimited, NOT auto-scanned at startup).
      # These make extra filesystem locations visible to the container so the
      # Settings UI can browse them and add libraries manually. Each path
      # listed here needs a matching volume mount above.
      - CALIBRE_EXTRA_PATHS=
      # Legacy single-library mode (uncomment ONLY if you need to bypass
      # multi-library discovery and point at a single metadata.db):
      # - CALIBRE_DB_PATH=/calibre/metadata.db
      # - CALIBRE_LIBRARY_PATH=/calibre

      # ── Calibre Integrations (optional) ──────────────────────
      # URL of your Calibre-Web instance (janeczku/calibre-web or
      # calibre-web-automated). Enables deep "Open in Calibre Web"
      # links to individual books in the sidebar.
      # Example: http://192.168.1.100:8083
      - CALIBRE_WEB_URL=
      # URL of your Calibre content server or main library UI. Shown
      # as a quick-access button on the dashboard.
      # Example: http://192.168.1.100:8181
      - CALIBRE_URL=

      # ── Metadata Sources ─────────────────────────────────────
      # Hardcover API key (get from hardcover.app → Account → API).
      # Must include "Bearer " prefix, e.g.: Bearer eyJ...
      # Can also be configured via the Settings UI after first run.
      # On first start, this value is migrated into the encrypted
      # credential store (see SECURITY.md) and the env var becomes
      # informational only.
      - HARDCOVER_API_KEY=

      # ── MyAnonamouse (optional) ──────────────────────────────
      # MAM session cookie (mam_id or mbsc) for cross-referencing
      # book availability against MAM. Configure via Settings UI for
      # the full setup flow. Once configured, AthenaScout intercepts
      # MAM's Set-Cookie rotations automatically — paste your token
      # once, never re-paste. See docs/mam-integration.md.
      # - MAM_SESSION_ID=
      # How often the scheduled MAM scan checks books missing MAM data
      # (minutes; 0 = scheduled scans disabled, manual scans still work).
      - MAM_SCAN_INTERVAL_MINUTES=360

      # ── Hermeece + ntfy (optional, configured via Settings UI) ─
      # The Hermeece URL ("Send to Hermeece" buttons) and ntfy
      # URL/topic + per-event toggles + digest schedule are all
      # managed in Settings, not env vars — they live in
      # settings.json so the UI can edit them. See docs/first-run.md
      # sections 13 and 14.

      # ── Sync / Scan Intervals ────────────────────────────────
      # How often to re-sync the library source database (minutes, 0 = disabled).
      - SYNC_INTERVAL_MINUTES=60
      # How often to re-scan metadata sources for new books (minutes, 0 = disabled).
      - LOOKUP_INTERVAL_MINUTES=4320

      # ── Authentication (optional) ────────────────────────────
      # Auth signing secret. If unset, AthenaScout generates one at first
      # run and persists it to <data_dir>/auth_secret with mode 0600.
      # Set this env var (≥32 chars high-entropy random) when you'd
      # rather inject the secret via Docker/Kubernetes secrets and avoid
      # writing it to the data directory at all. See SECURITY.md.
      # - ATHENASCOUT_AUTH_SECRET=

      # ── App Settings ─────────────────────────────────────────
      # Port for the web UI (must match the container port mapping above).
      - WEBUI_PORT=8787
      # Enable verbose/debug logging on startup (true/false).
      - VERBOSE_LOGGING=false
    restart: unless-stopped
